<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全自动股票行情（立刻出结果）</title>
<style>
  body{background:#f5f5f5;font-family:Arial;padding:10px;margin:0}
  .title{text-align:center;font-size:20px;margin:10px 0;color:#333}
  .item{background:white;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .name{font-weight:bold}
  .code{font-size:12px;color:#666}
  .price{font-size:17px}
  .red{color:red}
  .green{color:green}
  .tip{text-align:center;color:#666;margin:10px;font-size:14px}
</style>

<div class="title">全自动股票行情</div>
<div class="tip">打开页面自动加载，无需任何操作</div>
<div id="list"></div>

<script>
// 直接扫你关心的代码，立刻出结果
const MY_STOCKS = ["000001", "600036", "000858", "600519"];
const API = "https://stock-api-wheat.vercel.app/api/stock?code=";
const list = document.getElementById("list");

async function loadAll() {
  for (const code of MY_STOCKS) {
    try {
      const res = await fetch(API + code);
      const data = await res.json();
      if (!data.price || !data.change) continue;
      const up = data.change >= 0;
      list.innerHTML += `
      <div class="item">
        <div>
          <div class="name">${data.name}</div>
          <div class="code">${data.code}</div>
        </div>
        <div style="text-align:right">
          <div class="price">${data.price.toFixed(2)}</div>
          <div class="${up ? 'red' : 'green'}">
            ${up ? '+' : ''}${data.change.toFixed(2)}%
          </div>
        </div>
      </div>`;
    } catch (e) {}
  }
}

window.onload = loadAll;
</script>
