<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全市场自动选股</title>
<style>
  body{background:#f5f5f5;font-family:Arial;padding:10px;margin:0}
  .title{text-align:center;font-size:20px;margin:10px 0;color:#333}
  .scan-tip{
    text-align:center;color:#ff5722;font-size:16px;
    margin:10px 0;font-weight:bold
  }
  .item{
    background:white;border-radius:10px;padding:12px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center
  }
  .name{font-weight:bold}
  .code{font-size:12px;color:#666}
  .price{font-size:17px}
  .red{color:red}
  .green{color:green}
</style>

<div class="title">全市场自动选股</div>
<div class="scan-tip" id="tip">正在扫描全网股票，请稍候...</div>
<div id="list"></div>

<script>
// 真正全市场 A 股代码段
const ranges = [
  { start: 600000, end: 605999 }, // 上证主板
  { start: 688000, end: 688999 }, // 科创板
  { start:  1000, end:  9999 }, // 深证主板 (000xxx)
  { start: 10000, end: 19999 }, // 深证主板 (001xxx)
  { start: 20000, end: 29999 }, // 中小板 (002xxx)
  { start: 300000, end: 300999 }, // 创业板 (300xxx)
  { start: 301000, end: 301999 }, // 创业板 (301xxx)
  { start: 800000, end: 899999 }  // 北交所
];
const delay = 50; // 最快速度

const API = "https://stock-api-wheat.vercel.app/api/stock?code=";
const list = document.getElementById("list");
const tip = document.getElementById("tip");

async function scan() {
  let total = 0;
  for (const r of ranges) {
    total += r.end - r.start + 1;
  }
  tip.textContent = `正在扫描全网股票（共${total}只），请稍候...`;

  let scanned = 0;
  for (const { start, end } of ranges) {
    for (let code = start; code <= end; code++) {
      const fullCode = code.toString().padStart(6, '0');
      try {
        const res = await fetch(API + fullCode);
        const data = await res.json();
        if (!data.price || !data.change) continue;

        // 筛选：只显示上涨股票
        const isGood = data.change > 0;
        if (!isGood) continue;

        const up = data.change >= 0;
        list.innerHTML += `
        <div class="item">
          <div>
            <div class="name">${data.name}</div>
            <div class="code">${data.code}</div>
          </div>
          <div style="text-align:right">
            <div class="price">${data.price.toFixed(2)}</div>
            <div class="${up ? 'red' : 'green'}">
              ${up ? '+' : ''}${data.change.toFixed(2)}%
            </div>
          </div>
        </div>`;
      } catch (e) {}
      scanned++;
      if (scanned % 100 === 0) {
        tip.textContent = `正在扫描全网股票（${scanned}/${total}），请稍候...`;
      }
      await new Promise(r => setTimeout(r, delay));
    }
  }

  tip.textContent = `扫描完成！共扫描${total}只股票`;
}

window.onload = scan;
</script>
