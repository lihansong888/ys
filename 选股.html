<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票实时行情</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#f5f5f5;margin:0;padding:15px}
.main{max-width:480px;margin:auto}
.batch-box{background:white;padding:12px;border-radius:10px;margin-bottom:10px}
textarea{width:100%;height:100px;border:1px solid #ddd;border-radius:8px;padding:10px;resize:none}
.btn{width:100%;background:#007bff;color:white;border:none;padding:12px;border-radius:8px;margin:5px 0;font-size:16px}
.item{background:white;padding:12px;border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between}
.name{font-weight:bold}
.code{font-size:12px;color:#666}
.price{font-size:18px;color:#007bff}
.red{color:red}
.green{color:green}
.del{color:red;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="main">
  <div class="batch-box">
    <textarea id="codes" placeholder="一行一个股票代码
000001
600036"></textarea>
    <button class="btn" onclick="batchAdd()">批量导入</button>
    <button class="btn" onclick="refreshAll()">刷新全部</button>
  </div>
  <div id="list"></div>
</div>

<script>
const API = "https://stock-api-wheat.vercel.app/api/stock?code=";
let stocks = JSON.parse(localStorage.getItem("stocks")) || [];

function save() { localStorage.setItem("stocks", JSON.stringify(stocks)); }
function render() {
  const dom = document.getElementById("list");
  dom.innerHTML = "";
  stocks.forEach(s => {
    const change = Number(s.change);
    dom.innerHTML += `
    <div class="item">
      <div>
        <div class="name">${s.name}</div>
        <div class="code">${s.code}</div>
        <span class="del" onclick="del('${s.code}')">删除</span>
      </div>
      <div style="text-align:right">
        <div class="price">${s.price || '-'}</div>
        <div class="${change>=0?'red':'green'}">${change>=0?'+':''}${change.toFixed(2)}%</div>
      </div>
    </div>`;
  });
}

async function getOne(code) {
  try {
    const r = await fetch(API+code);
    const d = await r.json();
    const item = stocks.find(x=>x.code===code);
    if(item && d.price!=null){
      item.name = d.name || code;
      item.price = Number(d.price).toFixed(2);
      item.change = Number(d.change);
    }
  }catch(e){}
}

async function refreshAll(){
  for(let s of stocks) await getOne(s.code);
  save(); render();
}

function batchAdd(){
  const t = document.getElementById("codes").value.trim();
  if(!t) return;
  const codes = t.split("\n").map(x=>x.trim()).filter(x=>x);
  codes.forEach(c=>{
    if(!stocks.some(x=>x.code===c)) stocks.push({code:c,name:c,price:"-",change:0});
  });
  save(); render(); refreshAll();
}

function del(code){
  stocks = stocks.filter(x=>x.code!==code); save(); render();
}

window.onload = ()=>{ render(); if(stocks.length) refreshAll(); };
</script>
</body>
</html>
